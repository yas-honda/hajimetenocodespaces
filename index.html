<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0"> -->
    <title>自分の名前のページ</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            text-align: center;
            margin-top: 80px;
            background: linear-gradient(135deg, #f8f0ff, #e0f7ff);
        }

        h1 {
            display: inline-block;
            animation: floatText 2.5s ease-in-out infinite;
        }

        p {
            font-size: 1.2rem;
            color: #333;
            margin-top: 20px;
            animation: fadeIn 2s ease forwards;
            opacity: 0;
        }

        @keyframes floatText {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <!-- コメントを入れる場所です。コメントはブラウザには表示されません。 -->
    <p><a href="game.html">運勢アドバイスゲームで遊ぶ</a></p>
    <p><a href="list.html">お気に入りリストを見る</a></p>
    <h2>今日の運勢</h2>
    <p id="fortune">ここに結果が出ます</p>

    <h2>気分スコア診断</h2>
    <p>今日の気分を 0〜10 の数値で mood 変数に書いて更新してください</p>
    <p id="result">ここに診断結果が出ます</p>

    <h1>こんにちは、ほんだです！</h1>
    <p>初めてHTMLを書いてます。</p>
    <img src="image.png" alt="Your Image" width="200" height="200">
    <br>
    <img src="image copy.png" alt="Your Image" width="200" height="200">
    <script>
        // おみくじエリア
        // const fortunes = ["大吉", "中吉", "小吉", "末吉", "凶"];
        const fortunes = ["凶", "末吉", "小吉", "中吉", "大吉"];
        const index = Math.floor(Math.random() * fortunes.length);
        const result = fortunes[index];

        console.log(result);

        // HTML の id="fortune" の要素を取り出して中身を書き換える
        document.getElementById("fortune").textContent = result;
        // -------------

        // 気分スコア診断
        const mood = index * 2 + 1;  // 0〜10 で気分を表す数値

        let message;

        if (mood >= 9) {
            message = "絶好調！その勢いを大切に";
        } else if (mood >= 6) {
            message = "いい感じ。今日もがんばろう";
        } else if (mood >= 3) {
            message = "ぼちぼち。無理せずいこう";
        } else {
            message = "お疲れさま。今日はゆっくり休もう";
        }

        console.log(message);
        document.getElementById("result").textContent = message;
    </script>
</body>

</html>
