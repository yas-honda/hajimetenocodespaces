<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>自分の名前のページ</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                text-align: center;
                margin-top: 80px;
                background: linear-gradient(135deg, #f8f0ff, #e0f7ff);
            }
            h1 {
                display: inline-block;
                font-size: 3rem;
                color: #4a148c;
                animation: floatText 2.5s ease-in-out infinite;
            }
            p {
                font-size: 1.2rem;
                color: #333;
                margin-top: 20px;
                animation: fadeIn 2s ease forwards;
                opacity: 0;
            }
            @keyframes floatText {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(-15px); }
            }
            @keyframes fadeIn {
                to { opacity: 1; }
            }
        </style>
    </head>
    <body>
        <!-- コメントを入れる場所です。コメントはブラウザには表示されません。 -->
        <h1>こんにちは、ほんだです！</h1>
        <p>初めてHTMLを書いてます。</p>
        <img src="image.png" alt="Your Image" width="200" height="200">
    </body>
</html>
