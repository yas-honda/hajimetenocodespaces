<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クリックゲーム</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1 id="message">まだ何もしていません</h1>
    <button id="my-button">サイコロを振る</button>

    <script>
        function rollDice() {
            return Math.floor(Math.random() * 6) + 1;
        }

        function handleRoll() {
            const result = rollDice();
            document.getElementById("message").textContent = "出た目: " + result;
        }

        const rollButton = document.getElementById("my-button");
        rollButton.addEventListener("click", handleRoll);
    </script>
</body>

</html>
