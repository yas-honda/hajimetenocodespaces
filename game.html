<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>運勢アドバイスゲーム</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>今日の運勢アドバイス</h1>
    <p>ページを更新するたびにサイコロが振られます</p>
    <p id="game-result">ここに結果が出ます</p>
    <p><a href="index.html">トップに戻る</a></p>

    <script>
        // 1〜6 のサイコロを 1 回だけ振る
        const dice = Math.floor(Math.random() * 6) + 1;

        // 出目で「今日のおすすめ行動」を分岐
        let advice;
        if (dice >= 5) {
            advice = "机を片付けて気持ちをリセット";
        } else if (dice >= 3) {
            advice = "コップ1杯の水を飲んでひと息";
        } else {
            advice = "深呼吸を3回してから次の作業へ";
        }

        // 結果を画面に表示
        const message = `🎲 ${dice} が出ました！→ ${advice}`;
        document.getElementById("game-result").textContent = message;
        console.log(message);

        const dice1 = Math.floor(Math.random() * 6) + 1;
        console.log(dice1);
        const dice2 = Math.floor(Math.random() * 6) + 1;
        console.log(dice2);
        const dice3 = Math.floor(Math.random() * 6) + 1;
        console.log(dice3);
        // ... これを 10 個まで書く

        const diceResults = [];
        for (let i = 0; i < 10; i++) {
            diceResults.push(Math.floor(Math.random() * 6) + 1);
        }
        console.log(diceResults);
    </script>
</body>

</html>
